[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--strict-markers"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "default",
]
markers = [
    "integration: requiere NIM y MinIO reales (no ejecutar sin infraestructura)",
]
